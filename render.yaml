services:
  - type: web
    name: quant-trader-chart-api
    runtime: python
    plan: free
    rootDir: cloud/chart_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
