name: Gainer10 Scan (daily)

# 每个美股交易日收盘后跑一次「涨>10% + 成交额>5000万」分板块多空扫描：
#   续涨A/B(追多) + 做空S(弱板块衰竭) → 写 JSON 供 iOS 拉取 + Bark 手机推送
on:
  schedule:
    # 21:20 UTC ≈ 美东收盘后（EDT 17:20 / EST 16:20），周一至周五
    - cron: "20 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gainer10-scan
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install yfinance pandas numpy lxml

      - name: Run gainer10 scan
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python gainer10_daily.py

      - name: Commit scan results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/gainer10_today.json \
                  research/gainer10_today.csv \
                  research/gainer10_history.csv \
                  ios/Resources/gainer10_today.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No scan changes"
            exit 0
          fi
          git commit -m "chore: gainer10 scan $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i failed"; sleep $((i * 5))
          done
          exit 1
