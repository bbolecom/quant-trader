name: QuantTrader
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

targets:
  QuantTrader:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 美股量化
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # 访问本机/局域网自托管服务（http）时需要；纯 https 云端可移除整段。
        NSLocalNetworkUsageDescription: 用于访问运行在本机或局域网的量化服务。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.quanttrader
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: ""   # 在 Xcode 里选择你的 Team 即可，或填你的 Team ID
        CODE_SIGN_STYLE: Automatic
