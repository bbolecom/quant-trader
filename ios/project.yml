name: QuantTrader
options:
  bundleIdPrefix: com.bbolecom
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  QuantTrader:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Info.plist
    resources:
      - path: Resources
    preBuildScripts:
      - name: Sync bundled research JSON
        basedOnDependencyAnalysis: false
        script: |
          python3 "${SRCROOT}/../scripts/sync_ios_bundles.py" || true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 美股量化
        CFBundleShortVersionString: "3.0"
        CFBundleVersion: "14"
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: AppLogo
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # 访问本机/局域网自托管服务（http）时需要；纯 https 云端可移除整段。
        NSLocalNetworkUsageDescription: 用于访问运行在本机或局域网的量化服务。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bbolecom.quanttrader
        MARKETING_VERSION: "3.0"
        CURRENT_PROJECT_VERSION: "11"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: QuantTrader
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: VNS9WMF475   # Changsha Chengmeng；换账号时在 Xcode 里改 Team
        CODE_SIGN_STYLE: Automatic
