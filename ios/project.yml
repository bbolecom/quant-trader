name: QuantTrader
options:
  bundleIdPrefix: com.bbolecom
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  QuantTrader:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Info.plist
    resources:
      - path: Resources
    preBuildScripts:
      - name: Sync bundled research JSON
        basedOnDependencyAnalysis: false
        script: |
          FILES="daily_pick_today.json gain15_daily_today.json speculative_pool.json surge_scan_today.json flow_daily_today.json flow_strategy_today.json ticker_pattern_today.json liquid_fleet_picks.json universal_playbook_today.json"
          for f in $FILES; do
            SRC="${SRCROOT}/../research/$f"
            DST="${SRCROOT}/Resources/$f"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$DST"
              echo "Synced $f → Resources"
            fi
          done
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 美股量化
        CFBundleShortVersionString: "3.0"
        CFBundleVersion: "8"
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: AppLogo
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # 访问本机/局域网自托管服务（http）时需要；纯 https 云端可移除整段。
        NSLocalNetworkUsageDescription: 用于访问运行在本机或局域网的量化服务。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bbolecom.quanttrader
        MARKETING_VERSION: "3.0"
        CURRENT_PROJECT_VERSION: "8"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: QuantTrader
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: VNS9WMF475   # Changsha Chengmeng；换账号时在 Xcode 里改 Team
        CODE_SIGN_STYLE: Automatic
